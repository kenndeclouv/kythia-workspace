<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kythia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #09090b 0%, #1a1a24 100%);
            color: #ededed;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .mascot {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
            animation: bounce 2s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05) translateY(-5px);
            }
        }

        h1 {
            margin: 0;
            font-weight: 700;
            font-size: 3rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            color: #a1a1aa;
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 0 auto 2rem auto;
            font-weight: 300;
        }

        .status {
            display: inline-flex;
            align-items: center;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid rgba(34, 197, 94, 0.2);
            margin-bottom: 2rem;
        }

        .status .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                opacity: 0.5;
                box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
            }

            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .path-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 12px;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .path-box:hover {
            border-color: rgba(96, 165, 250, 0.4);
            color: #e2e8f0;
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="container">
        <img src="https://cdn.kythia.my.id/assets/images/sticker/kythia_hello_512_tiny.png" alt="Kythia Mascot"
            class="mascot">
        <div class="status">
            <div class="dot"></div> Environment is Online
        </div>
        <h1>Kythia Workspace</h1>
        <p>Your beautiful, ultra-fast development server is up and running. Time to build something amazing.</p>

        <div class="path-box">
            Replace <strong>index.html</strong> inside your Document Root<br>to deploy your own application.
        </div>
    </div>
</body>

</html>
